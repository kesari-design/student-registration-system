<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Student Registration</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

min-height:100vh;

display:flex;

justify-content:center;

align-items:center;

overflow:hidden;

position:relative;

background:linear-gradient(-45deg,
#071952,
#088395,
#37B7C3,
#0ea5e9,
#2563eb,
#1d4ed8);

background-size:400% 400%;

animation:bgAnimation 15s ease infinite;

}

@keyframes bgAnimation{

0%{
background-position:0% 50%;
}

50%{
background-position:100% 50%;
}

100%{
background-position:0% 50%;
}

}

/* Floating Particles */

#particles{

position:absolute;

top:0;
left:0;

width:100%;
height:100%;

overflow:hidden;

z-index:0;

}

#particles span{

position:absolute;

display:block;

width:8px;
height:8px;

background:white;

border-radius:50%;

opacity:.35;

animation:float 18s linear infinite;

}

@keyframes float{

0%{

transform:translateY(110vh) scale(0);

}

100%{

transform:translateY(-20vh) scale(1.5);

}

}

/* Card */

.container{

position:relative;

z-index:10;

width:430px;

max-width:95%;

padding:40px;

background:rgba(255,255,255,.15);

backdrop-filter:blur(18px);

-webkit-backdrop-filter:blur(18px);

border:1px solid rgba(255,255,255,.25);

border-radius:25px;

box-shadow:

0 15px 45px rgba(0,0,0,.25);

animation:fade .8s ease;

}

@keyframes fade{

from{

opacity:0;

transform:translateY(40px);

}

to{

opacity:1;

transform:translateY(0);

}

}

/* Avatar */

.avatar{

width:110px;
height:110px;

margin:auto;

margin-top:-90px;

margin-bottom:20px;

border-radius:50%;

background:white;

display:flex;

justify-content:center;

align-items:center;

font-size:50px;

color:#2563eb;

box-shadow:0 10px 30px rgba(0,0,0,.25);

animation:rotateAvatar 8s linear infinite;

}

@keyframes rotateAvatar{

100%{

transform:rotateY(360deg);

}

}

h2{

text-align:center;

color:white;

font-size:30px;

margin-bottom:5px;

}

.subtitle{

text-align:center;

color:#dbeafe;

margin-bottom:25px;

font-size:14px;

}

/* Input */

.input-group{

position:relative;

margin-bottom:22px;

}

.input-group i{

position:absolute;

left:18px;

top:16px;

color:#2563eb;

}

.input-group input{

width:100%;

padding:15px 18px 15px 48px;

border:none;

outline:none;

border-radius:15px;

background:white;

font-size:15px;

transition:.3s;

}

.input-group input:focus{

transform:scale(1.02);

box-shadow:

0 0 15px rgba(37,99,235,.4);

}

.error{

color:#ffdcdc;

font-size:13px;

margin-top:5px;

font-weight:500;

}

button{

width:100%;

padding:15px;

border:none;

border-radius:15px;

font-size:17px;

font-weight:600;

cursor:pointer;

background:linear-gradient(45deg,#2563eb,#38bdf8);

color:white;

transition:.3s;

}

button:hover{

transform:translateY(-4px);

box-shadow:0 12px 25px rgba(0,0,0,.25);

}
/* ===============================
   Footer
================================ */

.footer{
margin-top:30px;
text-align:center;
color:white;
font-size:14px;
}

.footer strong{
color:#7dd3fc;
}

.tech{

margin-top:15px;

display:flex;

justify-content:center;

flex-wrap:wrap;

gap:10px;

}

.badge{

display:flex;

align-items:center;

gap:8px;

padding:10px 15px;

border-radius:30px;

background:rgba(255,255,255,.15);

backdrop-filter:blur(10px);

color:white;

font-size:13px;

transition:.3s;

}

.badge:hover{

transform:translateY(-4px);

background:rgba(255,255,255,.25);

box-shadow:0 8px 20px rgba(0,0,0,.2);

}

.badge i{

color:#7dd3fc;

}

/* ===============================
   Success Popup
================================ */

.success-popup{

position:fixed;

left:0;

top:0;

width:100%;

height:100%;

background:rgba(0,0,0,.55);

display:flex;

justify-content:center;

align-items:center;

visibility:hidden;

opacity:0;

transition:.4s;

z-index:999;

}

.success-popup.active{

visibility:visible;

opacity:1;

}

.success-content{

width:360px;

max-width:90%;

background:white;

padding:35px;

border-radius:25px;

text-align:center;

animation:popup .5s ease;

}

.success-content i{

font-size:70px;

color:#22c55e;

margin-bottom:20px;

}

.success-content h3{

margin-bottom:10px;

color:#0f172a;

}

.success-content p{

color:#555;

margin-bottom:20px;

}

.success-content button{

background:#2563eb;

}

@keyframes popup{

from{

transform:scale(.5);

opacity:0;

}

to{

transform:scale(1);

opacity:1;

}

}

/* ===============================
   Responsive
================================ */

@media(max-width:768px){

.container{

width:95%;

padding:28px;

}

.avatar{

width:90px;

height:90px;

font-size:40px;

margin-top:-70px;

}

h2{

font-size:25px;

}

.input-group input{

font-size:14px;

padding:14px 16px 14px 45px;

}

button{

font-size:15px;

}

.badge{

font-size:12px;

padding:8px 12px;

}

}

@media(max-width:480px){

.container{

padding:22px;

}

.avatar{

width:80px;

height:80px;

font-size:34px;

}

.subtitle{

font-size:13px;

}

.footer{

font-size:12px;

}

}

</style>

</head>

<body>

<div id="particles"></div>

<div class="container">

<div class="avatar">
<i class="fa-solid fa-user-tie"></i>
</div>

<h2>Student Registration</h2>

<p class="subtitle">
Register your details securely
</p>

<form
th:action="@{/save}"
th:object="${student}"
method="post">

<!-- Name -->

<div class="input-group">

    <i class="fa-solid fa-user"></i>

    <input
            type="text"
            th:field="*{name}"
            placeholder="Enter Full Name">

    <div class="error"
         th:if="${#fields.hasErrors('name')}"
         th:errors="*{name}">
    </div>

</div>


<!-- Phone -->

<div class="input-group">

    <i class="fa-solid fa-phone"></i>

    <input
            type="text"
            th:field="*{phone}"
            placeholder="Enter Phone Number">

    <div class="error"
         th:if="${#fields.hasErrors('phone')}"
         th:errors="*{phone}">
    </div>

</div>


<!-- Email -->

<div class="input-group">

    <i class="fa-solid fa-envelope"></i>

    <input
            type="email"
            th:field="*{email}"
            placeholder="Enter Email Address">

    <div class="error"
         th:if="${#fields.hasErrors('email')}"
         th:errors="*{email}">
    </div>

</div>


<button type="submit">

    <i class="fa-solid fa-paper-plane"></i>

    Register Now

</button>

</form>


<div class="footer">

    <h3>

        Built with ❤️ by

        <strong>Kesarinadh</strong>

    </h3>

    <br>

    <div class="tech">

        <div class="badge">

            <i class="fa-brands fa-java"></i>

            Java

        </div>

        <div class="badge">

            <i class="fa-solid fa-leaf"></i>

            Spring Boot

        </div>

        <div class="badge">

            <i class="fa-solid fa-database"></i>

            MySQL

        </div>

        <div class="badge">

            <i class="fa-solid fa-layer-group"></i>

            Hibernate

        </div>

        <div class="badge">

            <i class="fa-solid fa-code"></i>

            Thymeleaf

        </div>

    </div>

</div>

</div>


<div class="success-popup" id="successPopup">

    <div class="success-content">

        <i class="fa-solid fa-circle-check"></i>

        <h3>Registration Successful!</h3>

        <p>Your details have been saved successfully.</p>

        <button onclick="closePopup()">

            Continue

        </button>

    </div>

</div>

<script th:inline="javascript">

	// ===============================
	// Floating Particles
	// ===============================

	const particles = document.getElementById("particles");

	for(let i=0;i<80;i++){

	    const particle=document.createElement("span");

	    particle.style.left=Math.random()*100+"%";

	    particle.style.top=Math.random()*100+"%";

	    particle.style.width=(Math.random()*8+4)+"px";

	    particle.style.height=particle.style.width;

	    particle.style.animationDuration=(10+Math.random()*15)+"s";

	    particle.style.animationDelay=Math.random()*8+"s";

	    particles.appendChild(particle);

	}


	// ===============================
	// Success Popup
	// ===============================

	function closePopup(){

	    document
	    .getElementById("successPopup")
	    .classList
	    .remove("active");

	}


	// ===============================
	// Show Popup after Successful Save
	// ===============================

	window.onload=function(){

	    let success="[[${success}]]";

	    if(success==="true"){

	        document
	        .getElementById("successPopup")
	        .classList
	        .add("active");

	    }

	}


	// ===============================
	// Button Ripple Effect
	// ===============================

	const btn=document.querySelector("button");

	btn.addEventListener("mouseenter",()=>{

	    btn.style.transform="translateY(-4px) scale(1.03)";

	});

	btn.addEventListener("mouseleave",()=>{

	    btn.style.transform="translateY(0) scale(1)";

	});


	// ===============================
	// Input Focus Animation
	// ===============================

	const inputs=document.querySelectorAll("input");

	inputs.forEach(input=>{

	input.addEventListener("focus",()=>{

	input.parentElement.style.transform="scale(1.02)";

	});

	input.addEventListener("blur",()=>{

	input.parentElement.style.transform="scale(1)";

	});

	});


	// ===============================
	// Avatar Floating Animation
	// ===============================

	const avatar=document.querySelector(".avatar");

	setInterval(()=>{

	avatar.animate([

	{transform:'translateY(0px)'},

	{transform:'translateY(-8px)'},

	{transform:'translateY(0px)'}

	],{

	duration:2500

	});

	},2500);

	</script>

	</body>

	</html>
